name: publish-to-github-pages
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Rust binary 📦
        id: cache-rust-binary
        uses: actions/cache@v4
        with:
          path: target/release/blog-builder
          key: ${{ runner.os }}-rust-binary-smart-similar-${{ hashFiles('src/**/*.rs', 'Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-binary-

      - name: Setup Rust 🦀
        if: steps.cache-rust-binary.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies ⚡
        if: steps.cache-rust-binary.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Build Rust blog builder 🔨
        if: steps.cache-rust-binary.outputs.cache-hit != 'true'
        run: cargo build --release --features smart-similar

      - name: Cache HuggingFace model 🧠
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--minishlab--potion-multilingual-128M
          key: hf-model-potion-multilingual-128M

      - name: Build static site 🏗️
        run: ./target/release/blog-builder --smart-similar

      - name: Upload artifact 📡
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
